apiVersion: v1
kind: Namespace
metadata:
  name: structsim
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: structsim-backend-config
  namespace: structsim
data:
  FLASK_ENV: "production"
  APP_PORT: "6060"
  DATABASE_URL: "mysql+pymysql://user:password@mysql-host:3306/structsim?charset=utf8mb4"
  LEGACY_MYSQL_URL: "mysql+pymysql://user:password@legacy-host:3306/legacy_db?charset=utf8mb4"
  SECRET_KEY: "replace-with-production-secret"
  JWT_SECRET_KEY: "replace-with-production-jwt-secret"
  CORS_ORIGINS: "http://frontend.internal"
  UPLOAD_FOLDER: "/mnt/external/upload"
  GUNICORN_WORKERS: "2"
  GUNICORN_THREADS: "8"
  GUNICORN_TIMEOUT: "180"
  GUNICORN_MAX_REQUESTS: "1000"
  GUNICORN_MAX_REQUESTS_JITTER: "100"
  AUTO_PLATFORM_FEATURES_UPGRADE: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: structsim-backend
  namespace: structsim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: structsim-backend
  template:
    metadata:
      labels:
        app: structsim-backend
    spec:
      containers:
        - name: backend
          image: structsim-backend:py312
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - python run.py --init-db && gunicorn -c gunicorn_conf.py wsgi:app
          ports:
            - containerPort: 6060
              name: http
          envFrom:
            - configMapRef:
                name: structsim-backend-config
          volumeMounts:
            - name: upload-data
              mountPath: /mnt/external/upload
            - name: shared-data
              mountPath: /mnt/external/shared
            - name: logs-data
              mountPath: /mnt/external/logs
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: upload-data
          hostPath:
            path: /data/structsim/upload
            type: DirectoryOrCreate
        - name: shared-data
          hostPath:
            path: /data/structsim/shared
            type: DirectoryOrCreate
        - name: logs-data
          hostPath:
            path: /data/structsim/logs
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: structsim-backend
  namespace: structsim
spec:
  selector:
    app: structsim-backend
  ports:
    - name: http
      port: 6060
      targetPort: http
  type: ClusterIP
